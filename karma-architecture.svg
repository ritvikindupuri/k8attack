  <text x="617" y="320" text-anchor="middle" fill="#238636" font-size="9" dy="-12">handler.py</text>
  <text x="617" y="348" text-anchor="middle" fill="#8b949e" font-size="9">Live Broadcast</text>
  <text x="617" y="362" text-anchor="middle" fill="#8b949e" font-size="9">Client Connections</text>

  <rect x="710" y="206" width="160" height="85" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="710" y="206" width="160" height="28" rx="8" fill="url(#engine)" opacity="0.15"/>
  <text x="790" y="224" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">Cluster Manager</text>
  <text x="790" y="224" text-anchor="middle" fill="#238636" font-size="9" dy="-12">manager.py</text>
  <text x="790" y="252" text-anchor="middle" fill="#8b949e" font-size="9">kind create / delete</text>
  <text x="790" y="266" text-anchor="middle" fill="#8b949e" font-size="9">k8s API (core/RBAC)</text>
  <text x="790" y="280" text-anchor="middle" fill="#8b949e" font-size="9">Vulnerable Configs</text>

