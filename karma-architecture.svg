  <text x="595" y="461" text-anchor="middle" fill="#c9d1d9" font-size="10">claude-sonnet-4-20250514</text>

  <text x="595" y="488" text-anchor="middle" fill="#8b949e" font-size="9">Chain-of-thought reasoning</text>

  <!-- Docker -->
  <rect x="730" y="408" width="140" height="90" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="730" y="408" width="140" height="28" rx="8" fill="url(#cluster)" opacity="0.15"/>
  <text x="800" y="426" text-anchor="middle" fill="#d29922" font-size="12" font-weight="700">Docker</text>
  <text x="800" y="462" text-anchor="middle" fill="#8b949e" font-size="9">Container Runtime</text>
  <text x="800" y="482" text-anchor="middle" fill="#8b949e" font-size="9">29.5.2</text>

  <!-- Remediation overlay -->
  <rect x="490" y="508" width="210" height="48" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="490" y="508" width="210" height="48" rx="8" fill="url(#remediation)" opacity="0.1"/>
  <text x="595" y="528" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="700">Remediation Agent</text>
  <text x="595" y="544" text-anchor="middle" fill="#8b949e" font-size="9">Autonomous kubectl commands</text>

  <!-- Report -->
