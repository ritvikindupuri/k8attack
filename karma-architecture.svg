<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="cli" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="engine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e4429"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>
    <linearGradient id="cluster" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9e6a03"/>
      <stop offset="100%" stop-color="#d29922"/>
    </linearGradient>
    <linearGradient id="remediation" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b3b6b"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8b949e"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#58a6ff"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="700" letter-spacing="2">KARMA — System Architecture</text>
  <text x="450" y="54" text-anchor="middle" fill="#8b949e" font-size="11" letter-spacing="1">Kubernetes Attack &amp; Remediation Mapping Agent</text>

  <!-- ═══════ LAYER LABELS ═══════ -->
  <text x="24" y="90" fill="#8b949e" font-size="10" letter-spacing="1.5" font-weight="600">INTERFACE</text>
  <line x1="24" y1="94" x2="120" y2="94" stroke="#30363d" stroke-width="1"/>

  <text x="24" y="220" fill="#8b949e" font-size="10" letter-spacing="1.5" font-weight="600">CORE ENGINE</text>
  <line x1="24" y1="224" x2="130" y2="224" stroke="#30363d" stroke-width="1"/>

  <text x="24" y="420" fill="#8b949e" font-size="10" letter-spacing="1.5" font-weight="600">EXTERNAL</text>
  <line x1="24" y1="424" x2="100" y2="424" stroke="#30363d" stroke-width="1"/>

  <!-- ═══════ LAYER 1: CLI ═══════ -->
  <!-- CLI Box -->
  <rect x="200" y="74" width="500" height="110" rx="8" fill="#161b22" stroke="#1f6feb" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="200" y="74" width="500" height="28" rx="8" fill="url(#cli)" opacity="0.15"/>
  <text x="450" y="92" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">Interactive CLI</text>
  <text x="240" y="92" text-anchor="middle" fill="#1f6feb" font-size="9">cli.py</text>

  <rect x="220" y="112" width="140" height="56" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="290" y="130" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600">Interactive Menu</text>
  <text x="290" y="144" text-anchor="middle" fill="#8b949e" font-size="9">Options 1–14</text>
  <text x="290" y="158" text-anchor="middle" fill="#8b949e" font-size="9">Attack Selection</text>

  <rect x="380" y="112" width="140" height="56" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="450" y="130" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600">Live Terminal Output</text>
  <text x="450" y="144" text-anchor="middle" fill="#8b949e" font-size="9">Thinking → Command</text>
  <text x="450" y="158" text-anchor="middle" fill="#8b949e" font-size="9">→ Output</text>

  <rect x="540" y="112" width="140" height="56" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="610" y="130" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600">Results Viewer</text>
  <text x="610" y="144" text-anchor="middle" fill="#8b949e" font-size="9">MITRE Grid</text>
  <text x="610" y="158" text-anchor="middle" fill="#8b949e" font-size="9">Summary Table</text>

  <!-- ═══════ LAYER 2: CORE ENGINE ═══════ -->
  <!-- FastAPI -->
  <rect x="34" y="206" width="190" height="180" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="34" y="206" width="190" height="28" rx="8" fill="url(#engine)" opacity="0.15"/>
  <text x="129" y="224" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">FastAPI Server</text>
  <text x="129" y="224" text-anchor="middle" fill="#238636" font-size="9" dy="-12">main.py</text>

  <rect x="48" y="244" width="162" height="26" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="129" y="261" text-anchor="middle" fill="#c9d1d9" font-size="10">GET /api/results</text>

  <rect x="48" y="276" width="162" height="26" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="129" y="293" text-anchor="middle" fill="#c9d1d9" font-size="10">GET /api/report</text>

  <rect x="48" y="308" width="162" height="26" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="129" y="325" text-anchor="middle" fill="#c9d1d9" font-size="10">POST /api/chat</text>

  <rect x="48" y="340" width="162" height="26" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="129" y="357" text-anchor="middle" fill="#c9d1d9" font-size="10">WebSocket /ws</text>

  <!-- Attack Engine -->
  <rect x="252" y="206" width="270" height="180" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="252" y="206" width="270" height="28" rx="8" fill="url(#engine)" opacity="0.15"/>
  <text x="387" y="224" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">Attack Engine</text>
  <text x="387" y="224" text-anchor="middle" fill="#238636" font-size="9" dy="-12">attack_engine/</text>

  <!-- Attack modules grid -->
  <rect x="264" y="244" width="117" height="44" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="322" y="258" text-anchor="middle" fill="#f78166" font-size="8" font-weight="600">PRIVILEGE ESCALATION</text>
  <text x="322" y="272" text-anchor="middle" fill="#8b949e" font-size="8">HostPath · RBAC · Escape</text>

  <rect x="392" y="244" width="117" height="44" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="450" y="258" text-anchor="middle" fill="#d29922" font-size="8" font-weight="600">COLLECTION</text>
  <text x="450" y="272" text-anchor="middle" fill="#8b949e" font-size="8">Secrets · ConfigMap · DNS</text>

  <rect x="264" y="296" width="117" height="44" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="322" y="310" text-anchor="middle" fill="#d29922" font-size="8" font-weight="600">DISCOVERY</text>
  <text x="322" y="324" text-anchor="middle" fill="#8b949e" font-size="8">Network Scan · Kubelet API</text>

  <rect x="392" y="296" width="117" height="44" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="450" y="310" text-anchor="middle" fill="#f78166" font-size="8" font-weight="600">IMPACT</text>
  <text x="450" y="324" text-anchor="middle" fill="#8b949e" font-size="8">Resource Hijacking</text>

  <rect x="264" y="348" width="245" height="26" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="386" y="365" text-anchor="middle" fill="#8b949e" font-size="9">10 attack modules × MITRE ATT&amp;CK mapped</text>

  <!-- Detection + WS -->
  <rect x="550" y="206" width="135" height="82" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="550" y="206" width="135" height="28" rx="8" fill="url(#engine)" opacity="0.15"/>
