  <!-- FastAPI → Report -->
  <line x1="224" y1="350" x2="260" y2="508" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="34" y="574" width="12" height="12" rx="2" fill="#1f6feb" opacity="0.6"/>
  <text x="52" y="584" fill="#8b949e" font-size="9">CLI Layer</text>
  <rect x="130" y="574" width="12" height="12" rx="2" fill="#238636" opacity="0.6"/>
  <text x="148" y="584" fill="#8b949e" font-size="9">Backend Engine</text>
  <rect x="260" y="574" width="12" height="12" rx="2" fill="#d29922" opacity="0.6"/>
  <text x="278" y="584" fill="#8b949e" font-size="9">Infrastructure</text>
  <rect x="390" y="574" width="12" height="12" rx="2" fill="#bc8cff" opacity="0.6"/>
  <text x="408" y="584" fill="#8b949e" font-size="9">AI / Remediation</text>
