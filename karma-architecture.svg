  <rect x="200" y="408" width="210" height="28" rx="8" fill="url(#cluster)" opacity="0.15"/>
  <text x="305" y="426" text-anchor="middle" fill="#d29922" font-size="12" font-weight="700">Kind Cluster</text>

  <circle cx="260" cy="462" r="6" fill="#3fb950"/>
  <text x="272" y="466" fill="#c9d1d9" font-size="10">Control Plane</text>
  <circle cx="260" cy="482" r="6" fill="#3fb950"/>
  <text x="272" y="486" fill="#c9d1d9" font-size="10">Worker Node 1</text>
  <circle cx="376" cy="482" r="6" fill="#3fb950"/>
  <text x="388" y="486" fill="#c9d1d9" font-size="10">Worker Node 2</text>

  <!-- Anthropic -->
  <rect x="490" y="408" width="210" height="90" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="490" y="408" width="210" height="28" rx="8" fill="url(#remediation)" opacity="0.15"/>
  <text x="595" y="426" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="700">Anthropic Claude API</text>

