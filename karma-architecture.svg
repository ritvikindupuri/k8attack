  <text x="617" y="224" text-anchor="middle" fill="#238636" font-size="9" dy="-12">monitor.py</text>
  <text x="617" y="254" text-anchor="middle" fill="#8b949e" font-size="9">K8s Watch API</text>
  <text x="617" y="268" text-anchor="middle" fill="#8b949e" font-size="9">7 Alert Rules</text>
  <text x="617" y="282" text-anchor="middle" fill="#8b949e" font-size="9">Real-time Events</text>

