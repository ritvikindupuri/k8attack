  <text x="305" y="528" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">PDF Report</text>
  <text x="305" y="544" text-anchor="middle" fill="#8b949e" font-size="9">generator.py · ReportLab</text>

  <!-- ═══════ ARROWS ═══════ -->

  <!-- CLI → Attack Engine -->
  <line x1="450" y1="184" x2="450" y2="206" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-accent)" stroke-dasharray="4,2"/>

  <!-- CLI → FastAPI -->
  <line x1="350" y1="184" x2="129" y2="206" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-accent)" stroke-dasharray="4,2"/>

  <!-- CLI → Detection -->
  <line x1="550" y1="184" x2="617" y2="206" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-accent)" stroke-dasharray="4,2"/>

  <!-- CLI → Cluster Mgr -->
  <line x1="550" y1="184" x2="790" y2="206" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-accent)" stroke-dasharray="4,2"/>

  <!-- Attack Engine → Cluster Manager -->
  <line x1="522" y1="350" x2="710" y2="280" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Attack Engine → kind cluster -->
  <line x1="387" y1="386" x2="305" y2="408" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Detection → Kind -->
  <line x1="617" y1="288" x2="617" y2="408" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Cluster Mgr → Kind -->
  <line x1="790" y1="291" x2="790" y2="350" stroke="#8b949e" stroke-width="1"/>
  <line x1="790" y1="350" x2="305" y2="350" stroke="#8b949e" stroke-width="1"/>
  <line x1="305" y1="350" x2="305" y2="408" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Detection → WS Mgr -->
  <line x1="617" y1="288" x2="617" y2="302" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- WS Mgr → CLI -->
  <line x1="617" y1="302" x2="617" y2="184" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Kind → Remediation -->
  <line x1="420" y1="460" x2="490" y2="460" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Remediation → Claude API -->
  <line x1="595" y1="486" x2="595" y2="508" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Claude → Remediation -->
  <line x1="595" y1="508" x2="595" y2="556" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Remediation → Kind -->
  <line x1="490" y1="530" x2="420" y2="530" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="420" y1="530" x2="420" y2="498" stroke="#8b949e" stroke-width="1"/>

  <!-- Kind → Docker -->
  <line x1="420" y1="460" x2="730" y2="460" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Report Generator -->
